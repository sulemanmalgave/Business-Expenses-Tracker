<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0F172A"/>
  
  <!-- Outer Glow Ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#1E293B" stroke-width="8"/>
  <rect x="36" y="36" width="440" height="440" rx="92" fill="none" stroke="#2563EB" stroke-width="4" stroke-opacity="0.3"/>

  <!-- Logo Graphics: Wallet, Growth Charts, Coin -->
  <!-- Coin Aura -->
  <circle cx="360" cy="180" r="48" fill="#10B981" fill-opacity="0.15"/>
  
  <!-- Coins / Money stack -->
  <g transform="translate(360, 180)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#10B981" stroke-width="12"/>
    <path d="M-10,-14 L10,14 M10,-14 L-10,14" stroke="#10B981" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="12" fill="#10B981"/>
  </g>

  <!-- Wallet Body / Clipboard -->
  <g transform="translate(120, 160)">
    <!-- Base Board -->
    <rect x="0" y="0" width="220" height="230" rx="36" fill="#1E293B" stroke="#334155" stroke-width="8"/>
    <!-- Wallet Card / Accent tab -->
    <rect x="-16" y="60" width="252" height="110" rx="24" fill="#2563EB" stroke="#3B82F6" stroke-width="6"/>
    <!-- Wallet Clip / Ring -->
    <rect x="70" y="86" width="80" height="58" rx="16" fill="#0F172A" stroke="#3B82F6" stroke-width="6"/>
    <circle cx="110" cy="115" r="10" fill="#10B981"/>
  </g>

  <!-- Growing graph lines representing rise in profit / control -->
  <path d="M160,370 L220,310 L280,335 L380,210" fill="none" stroke="#10B981" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="380" cy="210" r="16" fill="#10B981"/>
  <circle cx="220" cy="310" r="10" fill="#10B981"/>
</svg>
